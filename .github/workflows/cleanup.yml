name: 🗑️ Internal Repository Cleanup

on:
  workflow_dispatch: # 手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 显式声明写权限
    steps:
      - name: 🔑 Checkout repo
        uses: actions/checkout@v7
        # 无需 repository 和 token 参数，默认就是当前仓库

      - name: 🧹 Execute precision cleaning
        run: |
          set -euo pipefail

          # 定义版本目录
          VERSIONS=("24.10" "25.12")
          # 定义架构子目录
          ARCHS=("aarch64_cortex-a53" "arm_cortex-a7_neon-vfpv4" "x86_64")

          for ver in "${VERSIONS[@]}"; do
            # 1. 架构目录白名单策略
            for arch in "${ARCHS[@]}"; do
              dir="$ver/$arch"
              if [ -d "$dir" ]; then
                echo "Reviewing $dir..."
                # 只保留这三种前缀的包
                find "$dir" -type f \
                  ! -name "natmapt*" \
                  ! -name "stuntman-client*" \
                  ! -name "vlmcsd*" \
                  -delete
              fi
            done

            # 2. Common 目录黑名单策略
            common_dir="$ver/common"
            if [ -d "$common_dir" ]; then
              echo "Reviewing $common_dir..."
              find "$common_dir" -type f \( -name "ca-bundle*" -o -name "ca-certificates*" \) -delete
            fi
          done

      - name: 🚀 Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --cached --quiet; then
            echo "Everything is already clean."
          else
            git commit -m "🗑️ Cleanup: Standardize package repository"
            git push origin HEAD:${{ github.ref_name }}
          fi

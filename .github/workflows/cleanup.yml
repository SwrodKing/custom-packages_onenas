name: 🗑️ One-time Repository Cleanup

on:
  workflow_dispatch: # 手动触发

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}

      - name: 🧹 Execute precision cleaning
        run: |
          set -euo pipefail

          # 定义版本目录
          VERSIONS=("24.10" "25.12")
          # 定义架构子目录
          ARCHS=("aarch64_cortex-a53" "arm_cortex-a7_neon-vfpv4" "x86_64")

          for ver in "${VERSIONS[@]}"; do
            # 1. 处理架构目录：只保留指定的三个包
            for arch in "${ARCHS[@]}"; do
              dir="$ver/$arch"
              if [ -d "$dir" ]; then
                echo "Reviewing $dir..."
                # 使用 find 删除不匹配指定模式的文件
                # ! -name 表示取反（不匹配则删除）
                find "$dir" -type f \
                  ! -name "natmapt*" \
                  ! -name "stuntman-client*" \
                  ! -name "vlmcsd*" \
                  -delete
                echo "✅ Cleaned $dir"
              fi
            done

            # 2. 处理 common 目录：只删除 ca-bundle 和 ca-certificates
            common_dir="$ver/common"
            if [ -d "$common_dir" ]; then
              echo "Reviewing $common_dir..."
              find "$common_dir" -type f \( -name "ca-bundle*" -o -name "ca-certificates*" \) -delete
              echo "✅ Cleaned $common_dir"
            fi
          done

      - name: 🚀 Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # 检查是否有文件被删除
          if git diff --cached --quiet; then
            echo "No junk files found. Repo is already clean."
          else
            git commit -m "🗑️ Cleanup: Remove redundant packages, keep core binaries"
            git push origin main
          fi

name: Auto distribuild feeds

on:
  push:
    branches:
      - main
      - Jackie264-patch-1
    paths:
      - '**/*.ipk'
      - '**/*.apk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  distribuild:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v6

#      - name: Cache build tools
#        id: cache-tools
#        uses: actions/cache@v5
#        with:
#          path: |
#            /usr/local/bin/usign
#            /usr/local/bin/apk
#            /usr/local/lib/libapk.so*
#          key: tools-v2512-${{ runner.os }}

      - name: Build and Install Tools (usign & apk-tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev zlib1g-dev libzstd-dev lua5.3 liblua5.3-dev pkg-config scdoc
          git clone https://git.openwrt.org/project/usign.git
          rm -rf usign apk-tools
          # 编译 usign
          git clone --depth 1 https://git.openwrt.org/project/usign.git
          cd usign && cmake . && make && sudo cp usign /usr/local/bin/ && cd ..
          
          # 编译 apk-tools v3 (静态链接以避免库文件路径问题)
          git clone --depth 1 https://gitlab.alpinelinux.org/alpine/apk-tools.git
          cd apk-tools
          make
          sudo make install
          cd ..
          
          # 3. 刷新动态库缓存
          sudo ldconfig

      - name: Restore signing key
        run: |
          echo "${{ secrets.FEED_SIGNING_KEY }}" | base64 -d > key-build
          chmod 600 key-build
          
      - name: 📦 Process Feeds (Dual Engine)
        run: |
          set -e
          mkdir -p public/releases

          # === 第一阶段：1:1 物理镜像同步并生成索引 ===
          for ver in "24.10" "25.12"; do
            PHYS_ROOT="releases/packages-$ver"
            [ ! -d "$PHYS_ROOT" ] && continue
            
            echo "📂 Mirroring Release: $ver"
            
            # 遍历该版本下的所有子目录 (luci, common, x86_64 等)
            for sub_dir_path in $(ls -d $PHYS_ROOT/*/ 2>/dev/null); do
              sub_dir=$(basename "$sub_dir_path")
              dest_dir="public/releases/packages-$ver/$sub_dir"
              
              echo "🚀 Syncing $sub_dir to $dest_dir"
              mkdir -p "$dest_dir"
              
              # 1:1 同步所有内容 (保留原有结构)
              rsync -rlptD "$sub_dir_path/" "$dest_dir/"
              
              # 寻找该目录下真正存放 .apk/.ipk 的地方生成索引
              # 如果是架构目录，包在 packages/ 下；如果是 luci/common，包就在根下
              target_pkg_dir="$dest_dir"
              [ -d "$dest_dir/packages" ] && target_pkg_dir="$dest_dir/packages"

              (
                cd "$target_pkg_dir"
                if [ "$(ls -A *.apk *.ipk 2>/dev/null)" ]; then
                  echo "📝 Indexing in $target_pkg_dir"
                  if [[ "$ver" == "25.12" ]]; then
                    apk mkndx --allow-untrusted --output packages.adb *.apk
                    usign -S -m packages.adb -s $GITHUB_WORKSPACE/key-build -x packages.adb.asc
                  else
                    chmod +x $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh
                    $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh . > Packages
                    usign -S -m Packages -s $GITHUB_WORKSPACE/key-build -x Packages.sig
                    gzip -9nc Packages > Packages.gz
                  fi
                fi
              )
            done
          done

          # === 第二阶段：创建软链接 (架构目录 -> 通用目录) ===
          for ver in "24.10" "25.12"; do
            VER_PUB="public/releases/packages-$ver"
            [ ! -d "$VER_PUB" ] && continue
            for arch_path in $(ls -d $VER_PUB/*/ 2>/dev/null); do
              arch=$(basename "$arch_path")
              # 只有架构目录（里面有 packages 文件夹的）才需要创建链接
              if [ -d "$arch_path/packages" ]; then
                echo "🔗 Linking $arch -> luci & common"
                ln -snf "../luci" "$arch_path/luci"
                ln -snf "../common" "$arch_path/common"
              fi
            done
          done
                    
          # A. 处理版本级的映射 (在 releases 目录内)
          cd public/releases
          echo "🔗 Creating Version-level symlinks..."
          # releases/packages-24.10.5 -> packages-24.10
          ln -snf packages-24.10 packages-24.10.5
          # releases/packages-25.12.0 -> packages-25.12
          ln -snf packages-25.12 packages-25.12.0

          # B. 处理“无前缀”版本目录到“packages-”物理目录的映射
          # 目标：releases/24.10.5/packages -> ../packages-24.10
          echo "🔗 Creating Router-friendly path symlinks..."
          
          mkdir -p 24.10.5 25.12.0
          ln -snf ../packages-24.10 24.10.5/packages
          ln -snf ../packages-25.12 25.12.0/packages
          
          cd ../.. # 回到根目录

          # 3. (可选) 验证链接是否正确
          echo "🔍 Verifying structure..."
          ls -R public/releases
          mkdir -p .stfolder

      - name: Sync feeds to self-hosted server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RSYNC_OPTS: "-avz --delete --no-perms --no-owner --no-group --omit-dir-times"
          RSYNC_PORT: ${{ secrets.RSYNC_PORT }}
        run: |
          echo "$DEPLOY_KEY" | base64 -d > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT \
            ${DEPLOY_USER}@${DEPLOY_SERVER} "whoami && pwd && ls -ld ${DEPLOY_PATH} || echo 'DEPLOY_PATH not found'"
          ssh -i deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p $RSYNC_PORT \
              ${DEPLOY_USER}@${DEPLOY_SERVER} "mkdir -vp ${DEPLOY_PATH}/.stfolder"
          rsync $RSYNC_OPTS --exclude '.stfolder' \
            -e "ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT" \
            public/ ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/
            
      - name: Deploy feed to GitHub Pages
        run: |
          cd public
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update feed $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages

name: Auto distribuild feeds

on:
  push:
    branches:
      - main
      - Jackie264-patch-1
    paths:
      - '**/*.ipk'
      - '**/*.apk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  distribuild:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/Jackie264-patch-1')

    steps:
      - uses: actions/checkout@v6
      
      - name: Cache usign binary
        id: cache-usign
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/usign
          key: usign-binary-v1

      - name: Build usign if cache missed
        if: steps.cache-usign.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git
          git clone https://git.openwrt.org/project/usign.git
          cd usign
          cmake .
          make
          sudo cp usign /usr/local/bin/

      - name: Restore signing key
        run: |
          echo "${{ secrets.FEED_SIGNING_KEY }}" | base64 -d > key-build
          chmod 600 key-build
          
      - name: Prepare feed directories
        run: |
          set -e
          chmod +x $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh
          mkdir -p public/24.10 public/25.12

          if [ -d "24.10" ] && [ "$(find 24.10 -name "*.ipk" | head -n 1)" ]; then
            echo "✨ Detected .ipk files, processing 24.10 feeds..."
            for arch_path in $(ls -d 24.10/*/); do
              arch=$(basename "$arch_path")
              dest="public/24.10/$arch"
              mkdir -p "$dest"
              
              cp 24.10/$arch/*.ipk "$dest/" 2>/dev/null || true

              if [ "$(ls -A "$dest"/*.ipk 2>/dev/null)" ]; then
                (
                  cd "$dest"
                  echo "📦 Generating index for 24.10/$arch"
                  rm -f Packages Packages.gz Packages.sig
                  $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh . > Packages
                  usign -S -m Packages -s $GITHUB_WORKSPACE/key-build -x Packages.sig
                  gzip -9nc Packages > Packages.gz
                )
              fi
            done
          else
            echo "⏭️ No .ipk files found in 24.10/, skipping IPK indexing."
          fi

          if [ -d "25.12" ] && [ "$(find 25.12 -name "*.apk" | head -n 1)" ]; then
            echo "✨ Detected .apk files, processing 25.12 assets..."
            for arch_path in $(ls -d 25.12/*/); do
              arch=$(basename "$arch_path")
              dest="public/25.12/$arch"
              mkdir -p "$dest"
              
              echo "🚚 Copying APKs to 25.12/$arch"
              cp 25.12/$arch/*.apk "$dest/" 2>/dev/null || true
            done
          else
            echo "⏭️ No .apk files found in 25.12/, skipping APK processing."
          fi
          
          cd public
          LINK_VERSIONS="24.10.4 24.10.5"

          for ver in ${LINK_VERSIONS}; do
            echo "Processing link: ${ver} -> 24.10"
            
            if [ -d "${ver}" ] && [ ! -L "${ver}" ]; then
              echo "Warning: ${ver} is a real directory, removing it to create link."
              rm -rf "${ver}"
            fi

            ln -snf 24.10 "${ver}"
          done

          echo "Current symbolic links:"
          ls -ld 24.10*
          mkdir -p .stfolder

      - name: Sync feeds to self-hosted server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RSYNC_OPTS: "-avz --delete --no-perms --no-owner --no-group --omit-dir-times"
          RSYNC_PORT: ${{ secrets.RSYNC_PORT }}
        run: |
          echo "$DEPLOY_KEY" | base64 -d > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT \
            ${DEPLOY_USER}@${DEPLOY_SERVER} "whoami && pwd && ls -ld ${DEPLOY_PATH} || echo 'DEPLOY_PATH not found'"
          ssh -i deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p $RSYNC_PORT \
              ${DEPLOY_USER}@${DEPLOY_SERVER} "mkdir -vp ${DEPLOY_PATH}/.stfolder"
          rsync $RSYNC_OPTS --exclude '.stfolder' \
            -e "ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT" \
            public/ ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/
            
      - name: Deploy feed to GitHub Pages
        run: |
          cd public
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update feed $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages

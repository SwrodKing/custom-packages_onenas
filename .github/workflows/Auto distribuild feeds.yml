name: Auto distribuild feeds

on:
  push:
    branches:
      - main
    paths:
      - '**/*.apk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  distribuild:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v6

      - name: Build and Install Tools (usign & apk-tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev zlib1g-dev libzstd-dev lua5.3 liblua5.3-dev pkg-config scdoc meson ninja-build
          
          git clone -b master https://gitlab.alpinelinux.org/alpine/apk-tools.git
          cd apk-tools
          meson setup -Dprefix=/usr/local build
          ninja -C build
          sudo meson install -C build
          cd ..
          
          sudo ldconfig

      - name: Restore signing key
        run: |
          # 设置 APK 签名密钥
          echo "${{ secrets.APK_SIGNING_KEY }}" | base64 -d > key-apk.sec
          chmod 600 key-apk.sec
          openssl ec -in key-apk.sec -pubout > public-key-25.12.pem

      - name: 📦 Process Feeds (Official Standards Alignment)
        run: |
          set -e
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          mkdir -p public/releases

          MAKE_INDEX_PY="$GITHUB_WORKSPACE/scripts/make-index-json.py"
          chmod +x "$MAKE_INDEX_PY"
          
          ver="25.12"
          PHYS_ROOT="releases/packages-$ver"
          [ ! -d "$PHYS_ROOT" ] && exit 0
          
          VALID_EXT="*.apk"

          # === 第一阶段：物理同步并生成索引 ===
          for sub_dir_path in $(ls -d $PHYS_ROOT/*/ 2>/dev/null); do
            sub_dir=$(basename "$sub_dir_path")
            dest_dir="$GITHUB_WORKSPACE/public/releases/packages-$ver/$sub_dir"
            
            pkg_src_dir="$sub_dir_path"
            [ -d "$sub_dir_path/packages" ] && pkg_src_dir="$sub_dir_path/packages"

            if [ "$(ls -A $pkg_src_dir/$VALID_EXT 2>/dev/null)" ]; then
              echo "📂 Processing 25.12 Feed: $sub_dir"
              mkdir -p "$dest_dir"
              
              if [ -d "$sub_dir_path/packages" ]; then
                mkdir -p "$dest_dir/packages"
                rsync -rlptD "$sub_dir_path/packages/" "$dest_dir/packages/"
                target_pkg_dir="$dest_dir/packages"
              else
                rsync -rlptD "$sub_dir_path/" "$dest_dir/"
                target_pkg_dir="$dest_dir"
              fi

              (
                cd "$target_pkg_dir"
                echo "✍️ Signing APK feed for $sub_dir with ECDSA"
                apk mkndx --allow-untrusted \
                  --sign "$GITHUB_WORKSPACE/key-apk.sec" \
                  --output packages.adb *.apk
                
                # 生成官方 JSON
                apk adbdump --format json packages.adb | python3 "$MAKE_INDEX_PY" -f apk -a "$sub_dir" - > index.json
              )
            else
              echo "⏭️ Skipping $sub_dir: No APK files found."
            fi
          done

          # === 第二阶段：影子目录处理 ===
          VER_PUB="$GITHUB_WORKSPACE/public/releases/packages-$ver"
          for arch_path in $(ls -d $VER_PUB/*/ 2>/dev/null); do
            arch=$(basename "$arch_path")
            [[ "$arch" == "luci" || "$arch" == "common" ]] && continue
            
            for group in "luci" "common"; do
              phys_dir_abs="$VER_PUB/$group"
              [ ! -d "$phys_dir_abs" ] && continue
              shadow_dir="$VER_PUB/$arch/$group"
              mkdir -p "$shadow_dir"
              
              (
                cd "$phys_dir_abs"
                valid_files=$(ls *.apk packages.adb* 2>/dev/null || true)
                
                if [ -n "$valid_files" ]; then
                  echo "🔗 Linking $group -> $arch (25.12)"
                  for f in $valid_files; do
                    ln -snf "../../$group/$f" "$shadow_dir/$f"
                  done
                  
                  cd "$shadow_dir"
                  apk adbdump --format json packages.adb | python3 "$MAKE_INDEX_PY" -f apk -a "$arch" - > index.json
                fi
              )
            done
          done

          # === 第三阶段：收尾 (25.12 专属) ===
          cp "$GITHUB_WORKSPACE/public-key-25.12.pem" "$GITHUB_WORKSPACE/public/releases/packages-25.12/key.pem"
          cd "$GITHUB_WORKSPACE/public/releases"
          ln -snf packages-25.12 packages-25.12.2
          ln -snf packages-25.12 packages-25.12.3
          ln -snf packages-25.12 packages-25.12.4
          mkdir -p 25.12.2 25.12.3 25.12.4
          ln -snf ../packages-25.12 25.12.2/packages
          ln -snf ../packages-25.12 25.12.3/packages
          ln -snf ../packages-25.12 25.12.4/packages
          
          echo "✅ All feeds processed successfully."
          mkdir -p $GITHUB_WORKSPACE/.stfolder

      - name: Sync feeds to self-hosted server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RSYNC_OPTS: "-avz --delete --no-perms --no-owner --no-group --omit-dir-times"
          RSYNC_PORT: ${{ secrets.RSYNC_PORT }}
        run: |
          echo "$DEPLOY_KEY" | base64 -d > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT \
            ${DEPLOY_USER}@${DEPLOY_SERVER} "mkdir -vp ${DEPLOY_PATH}/.stfolder"
          rsync $RSYNC_OPTS --exclude '.stfolder' \
            -e "ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT" \
            public/ ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/
            
      - name: Deploy feed to GitHub Pages
        run: |
          cd public
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update feed $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages

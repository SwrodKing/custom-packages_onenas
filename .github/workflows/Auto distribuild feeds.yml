name: Auto distribuild feeds

on:
  push:
    branches:
      - main
      - Jackie264-patch-1
    paths:
      - '**/*.ipk'
      - '**/*.apk'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  distribuild:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v6

      - name: Cache build tools
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/bin/usign
            /usr/local/bin/apk
          key: tools-v2512-${{ runner.os }}

      - name: Build tools if cache missed
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev zlib1g-dev libzstd-dev lua5.3 liblua5.3-dev pkg-config
          git clone https://git.openwrt.org/project/usign.git
          rm -rf usign apk-tools
          # 编译 usign
          git clone --depth 1 https://git.openwrt.org/project/usign.git
          cd usign && cmake . && make && sudo cp usign /usr/local/bin/ && cd ..
          
          # 编译 apk-tools v3 (静态链接以避免库文件路径问题)
          git clone --depth 1 https://gitlab.alpinelinux.org/alpine/apk-tools.git
          cd apk-tools
          # 只编译 src 目录下的核心程序和库，不触发 doc 目录的编译
          make src/
          
          # 手动执行安装逻辑（模仿 make install 但跳过 doc）
          sudo install -d /usr/local/sbin
          sudo install src/apk /usr/local/sbin/apk
          sudo install -d /usr/local/lib
          sudo install src/libapk.so.3.0.0 /usr/local/lib/
          sudo ln -sf /usr/local/lib/libapk.so.3.0.0 /usr/local/lib/libapk.so.3
          sudo ln -sf /usr/local/lib/libapk.so.3.0.0 /usr/local/lib/libapk.so
          cd ..
          
          # 3. 刷新动态库缓存
          sudo ldconfig

      - name: Restore signing key
        run: |
          echo "${{ secrets.FEED_SIGNING_KEY }}" | base64 -d > key-build
          chmod 600 key-build
          
      - name: 📦 Process Feeds (Dual Engine)
        run: |
          set -e
          mkdir -p public/24.10 public/25.12

          # --- Engine A: OpenWrt 24.10 (Legacy IPK) ---
          if [ -d "24.10" ]; then
            echo "✨ Processing 24.10 IPK feeds..."
            for arch_path in $(ls -d 24.10/*/ 2>/dev/null); do
              arch=$(basename "$arch_path")
              dest="public/24.10/$arch"
              mkdir -p "$dest"
              cp 24.10/$arch/*.ipk "$dest/" 2>/dev/null || true
              
              if [ "$(ls -A "$dest"/*.ipk 2>/dev/null)" ]; then
                (
                  cd "$dest"
                  echo "📝 Generating IPK index for $arch"
                  chmod +x $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh
                  $GITHUB_WORKSPACE/scripts/ipkg-make-index.sh . > Packages
                  usign -S -m Packages -s $GITHUB_WORKSPACE/key-build -x Packages.sig
                  gzip -9nc Packages > Packages.gz
                )
              fi
            done
          fi

          # --- Engine B: OpenWrt 25.12 (Modern APK v3) ---
          if [ -d "25.12" ]; then
            echo "✨ Processing 25.12 APK feeds..."
            for arch_path in $(ls -d 25.12/*/ 2>/dev/null); do
              arch=$(basename "$arch_path")
              dest="public/25.12/$arch"
              mkdir -p "$dest"
              cp 25.12/$arch/*.apk "$dest/" 2>/dev/null || true
              
              if [ "$(ls -A "$dest"/*.apk 2>/dev/null)" ]; then
                (
                  cd "$dest"
                  echo "📦 Generating APK ADB index for $arch"
                  # 使用我们编译的 apk-tools v3
                  apk mkndx --allow-untrusted --output packages.adb *.apk
                  # 签发 .asc 签名
                  usign -S -m packages.adb -s $GITHUB_WORKSPACE/key-build -x packages.adb.asc
                  echo "✅ $arch APK index done."
                )
              fi
            done
          fi
          
          cd public
          LINK_VERSIONS="24.10.4 24.10.5"

          for ver in ${LINK_VERSIONS}; do
            echo "Processing link: ${ver} -> 24.10"
            
            if [ -d "${ver}" ] && [ ! -L "${ver}" ]; then
              echo "Warning: ${ver} is a real directory, removing it to create link."
              rm -rf "${ver}"
            fi

            ln -snf 24.10 "${ver}"
          done

          echo "Current symbolic links:"
          ls -ld 24.10*
          mkdir -p .stfolder

      - name: Sync feeds to self-hosted server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RSYNC_OPTS: "-avz --delete --no-perms --no-owner --no-group --omit-dir-times"
          RSYNC_PORT: ${{ secrets.RSYNC_PORT }}
        run: |
          echo "$DEPLOY_KEY" | base64 -d > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT \
            ${DEPLOY_USER}@${DEPLOY_SERVER} "whoami && pwd && ls -ld ${DEPLOY_PATH} || echo 'DEPLOY_PATH not found'"
          ssh -i deploy_key \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p $RSYNC_PORT \
              ${DEPLOY_USER}@${DEPLOY_SERVER} "mkdir -vp ${DEPLOY_PATH}/.stfolder"
          rsync $RSYNC_OPTS --exclude '.stfolder' \
            -e "ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $RSYNC_PORT" \
            public/ ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/
            
      - name: Deploy feed to GitHub Pages
        run: |
          cd public
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update feed $(date +'%Y-%m-%d %H:%M:%S')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin gh-pages

name: 📂 Restructure Releases Subdirectories

on:
  workflow_dispatch:

jobs:
  restructure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: 🛠️ Execute Restructuring
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 定义需要处理的版本和架构
          VERSIONS=("packages-24.10" "packages-25.12")
          ARCHS=("aarch64_cortex-a53" "arm_cortex-a7_neon-vfpv4" "x86_64")

          for ver in "${VERSIONS[@]}"; do
            for arch in "${ARCHS[@]}"; do
              BASE_PATH="releases/$ver/$arch"
              
              if [ -d "$BASE_PATH" ]; then
                echo "Processing $BASE_PATH..."
                
                # 1. 创建临时的 packages 目录
                mkdir -p "$BASE_PATH/packages_tmp"
                
                # 2. 将当前架构目录下的所有文件（不包括新创建的 tmp 目录本身）移入 tmp
                # 使用 find 排除目录本身，只移动文件和文件夹
                find "$BASE_PATH" -maxdepth 1 -not -path "$BASE_PATH" -not -path "$BASE_PATH/packages_tmp" -exec mv {} "$BASE_PATH/packages_tmp/" \;
                
                # 3. 重命名临时目录为 packages
                mv "$BASE_PATH/packages_tmp" "$BASE_PATH/packages"
                
                echo "✅ $BASE_PATH restructure complete."
              fi
            done
          done

          # 提交更改
          git add releases/
          git commit -m "refactor: add 'packages' subdirectory level for each arch" || echo "No changes to commit"
          git push origin main
